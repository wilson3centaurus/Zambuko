account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

[analytics]
enabled = false

[functions.triage]
verify_jwt = true

[functions.livekit-token]
verify_jwt = true

[functions.payment-webhook]
verify_jwt = false

[functions.push-notification]
verify_jwt = true

[functions.doctor-heartbeat-cleanup]
verify_jwt = false
