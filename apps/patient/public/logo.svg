<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F07038"/>
      <stop offset="100%" stop-color="#D45520"/>
    </linearGradient>
  </defs>

  <!-- Cross icon (80×80 bounding box, centering the mark) -->
  <!-- Vertical arm -->
  <rect x="28" y="6"  width="24" height="68" rx="8" fill="url(#crossGrad)"/>
  <!-- Horizontal arm -->
  <rect x="6"  y="28" width="68" height="24" rx="8" fill="url(#crossGrad)"/>
  <!-- Teal centre -->
  <rect x="28" y="28" width="24" height="24" rx="4" fill="#1A6E7E"/>

  <!-- Circuit nodes at arm tips -->
  <circle cx="40" cy="13"  r="5" fill="#0D5060"/>
  <circle cx="40" cy="67"  r="5" fill="#0D5060"/>
  <circle cx="13" cy="40"  r="5" fill="#0D5060"/>
  <circle cx="67" cy="40"  r="5" fill="#0D5060"/>

  <!-- Connector lines node→centre -->
  <line x1="40" y1="18" x2="40" y2="28" stroke="#0D5060" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="52" x2="40" y2="62" stroke="#0D5060" stroke-width="3" stroke-linecap="round"/>
  <line x1="18" y1="40" x2="28" y2="40" stroke="#0D5060" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="40" x2="62" y2="40" stroke="#0D5060" stroke-width="3" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="40" cy="40" r="4" fill="#0D5060"/>

  <!-- HUTANO wordmark -->
  <text x="92" y="46"
    font-family="'Arial Black', Arial, Helvetica, sans-serif"
    font-weight="900" font-size="30" letter-spacing="1" fill="#0D3D4A">HUTANO</text>
  <!-- TELEHEALTH subtitle -->
  <text x="94" y="62"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400" font-size="11" letter-spacing="3.8" fill="#1A6E7E">TELEHEALTH</text>
</svg>
